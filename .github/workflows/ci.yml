name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-lancedb-knowledge/assets/knowledge-lancedb-template
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: openclaw-lancedb-knowledge/assets/knowledge-lancedb-template/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run postrun:check
      - name: Validate bootstrap script
        working-directory: .
        run: python3 -m py_compile openclaw-lancedb-knowledge/scripts/bootstrap_openclaw_lancedb.py
